<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF Viewer — Lanceur Grist</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:       #4a90d9;
      --accent-dark:  #357abd;
      --bg:           #f7f8fa;
      --text:         #333;
      --muted:        #888;
      --border:       #ddd;
      --green:        #27ae60;
      --red:          #c0392b;
    }

    html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; color: var(--text); }

    /* ── Zone principale cliquable ───────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      padding: 12px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    #app:hover  { background: #eef3fa; }
    #app:active { background: #dce8f7; }
    #app.no-pdf { cursor: default; }
    #app.no-pdf:hover  { background: var(--bg); }

    /* Icône PDF */
    .pdf-icon { width: 44px; height: 44px; flex-shrink: 0; }

    /* Label principal */
    #main-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      text-align: center;
    }
    #app.no-pdf #main-label { color: var(--muted); font-weight: 400; }

    /* Nom du fichier */
    #filename {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Statut live */
    #live-badge {
      display: none;
      font-size: 10px;
      background: var(--green);
      color: white;
      padding: 2px 7px;
      border-radius: 10px;
    }
    #live-badge.on { display: inline-block; }

    /* Séparateur */
    .divider { width: 80%; height: 1px; background: var(--border); margin: 4px 0; }

    /* Bouton paramètres */
    #btn-settings {
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      padding: 2px;
    }
    #btn-settings:hover { color: var(--text); }

    /* ── Panneau de configuration ─────────────────────────── */
    #config {
      display: none;
      width: 100%;
      max-width: 250px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin-top: 4px;
    }
    #config.open { display: block; }
    #config h3   { font-size: 12px; color: var(--text); margin-bottom: 10px; }
    #config label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    #config select {
      width: 100%; padding: 5px 8px;
      border: 1px solid var(--border); border-radius: 4px;
      font-size: 12px; margin-bottom: 10px; background: white;
    }
    #btn-save {
      width: 100%; padding: 6px;
      background: var(--accent); color: white;
      border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #btn-save:hover { background: var(--accent-dark); }

    #config-err { font-size: 11px; color: var(--red); margin-top: 6px; display: none; }
  </style>
</head>
<body>

<!-- Zone principale : clic = ouvrir le PDF -->
<div id="app" class="no-pdf">

  <svg class="pdf-icon" viewBox="0 0 48 48" fill="none">
    <rect x="6" y="2" width="28" height="36" rx="3" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="1.5"/>
    <path d="M28 2 L34 8 L28 8 Z" fill="#e74c3c" opacity="0.4"/>
    <text x="20" y="27" text-anchor="middle" font-size="9" font-weight="bold" fill="#e74c3c" font-family="sans-serif">PDF</text>
    <circle cx="38" cy="38" r="9" fill="#4a90d9"/>
    <path d="M34 38 h8 M38 34 v8" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </svg>

  <div id="main-label">Aucun PDF détecté</div>
  <div id="filename"></div>
  <span id="live-badge">● Live</span>

  <div class="divider"></div>
  <button id="btn-settings" onclick="event.stopPropagation()">⚙ Paramètres</button>

  <!-- Config inline (stopPropagation pour ne pas déclencher l'ouverture) -->
  <div id="config" onclick="event.stopPropagation()">
    <h3>⚙ Paramètres du widget</h3>

    <label>Colonne contenant le PDF</label>
    <select id="col-select"><option value="">— sélectionner —</option></select>

    <label>Type de colonne</label>
    <select id="col-type">
      <option value="url">URL (texte)</option>
      <option value="attachment">Pièce jointe Grist</option>
    </select>

    <button id="btn-save">Enregistrer</button>
    <div id="config-err"></div>
  </div>

</div>

<script>
  // ── URL du viewer (même dossier) ───────────────────────────────────────────
  const VIEWER_URL = location.href.replace(/\/index\.html.*$/, '') + '/viewer.html';

  const state = {
    columnName: null,
    columnType: 'url',
    currentUrl: null,
    currentName: null,
    popupWin: null,
    allColumns: [],   // colonnes détectées depuis les données
  };

  // ── DOM ────────────────────────────────────────────────────────────────────
  const app        = document.getElementById('app');
  const mainLabel  = document.getElementById('main-label');
  const filenameEl = document.getElementById('filename');
  const liveBadge  = document.getElementById('live-badge');
  const config     = document.getElementById('config');
  const colSelect  = document.getElementById('col-select');
  const colType    = document.getElementById('col-type');
  const configErr  = document.getElementById('config-err');

  // ── Clic sur la zone principale → ouvrir/mettre à jour le viewer ──────────
  app.addEventListener('click', () => {
    if (!state.currentUrl) return;
    openOrUpdateViewer();
  });

  // ── Bouton paramètres ──────────────────────────────────────────────────────
  document.getElementById('btn-settings').addEventListener('click', (e) => {
    e.stopPropagation();
    config.classList.toggle('open');
  });

  document.getElementById('btn-save').addEventListener('click', () => {
    const col = colSelect.value;
    if (!col) {
      showConfigErr('Sélectionnez une colonne.');
      return;
    }
    state.columnName = col;
    state.columnType = colType.value;
    grist.setOptions({ columnName: state.columnName, columnType: state.columnType });
    config.classList.remove('open');
    hideConfigErr();
  });

  // ── Grist API ──────────────────────────────────────────────────────────────
  grist.ready({ requiredAccess: 'read table' });

  // Récupère les options sauvegardées
  grist.onOptions((options) => {
    if (options?.columnName) state.columnName = options.columnName;
    if (options?.columnType) state.columnType = options.columnType;
    colType.value = state.columnType;
    refreshColSelector();
  });

  // Écoute tous les enregistrements → extrait les noms de colonnes
  grist.onRecords((records) => {
    if (!records || records.length === 0) return;
    // Toutes les clés du 1er enregistrement = noms de colonnes (sauf 'id')
    state.allColumns = Object.keys(records[0]).filter(k => k !== 'id');
    refreshColSelector();
  });

  // Écoute l'enregistrement sélectionné → charge le PDF
  grist.onRecord((record) => {
    if (!state.columnName || !record) {
      setNoPDF('Configurez une colonne (⚙ Paramètres)');
      return;
    }
    const value = record[state.columnName];
    if (!value) {
      setNoPDF('Valeur vide dans la colonne « ' + state.columnName + ' »');
      return;
    }
    handleValue(value);
  });

  // ── Résolution de la valeur selon le type ──────────────────────────────────
  function handleValue(value) {
    if (state.columnType === 'attachment') {
      // Grist stocke les pièces jointes comme ['L', id1, id2, ...]
      const ids = Array.isArray(value) ? value.filter(v => typeof v === 'number') : [];
      if (ids.length === 0) { setNoPDF('Aucune pièce jointe PDF trouvée.'); return; }
      // L'URL de téléchargement d'une pièce jointe Grist
      const base = location.origin;
      const url  = `${base}/api/attachments/${ids[0]}/download`;
      setPDF(url, 'Pièce jointe #' + ids[0]);
    } else {
      const url = String(value).trim();
      if (!url) { setNoPDF('URL vide.'); return; }
      const name = url.split('/').pop().split('?')[0] || 'document.pdf';
      setPDF(url, name);
    }
  }

  // ── État : PDF disponible ──────────────────────────────────────────────────
  function setPDF(url, name) {
    state.currentUrl  = url;
    state.currentName = name;
    app.classList.remove('no-pdf');
    mainLabel.textContent  = '▶ Cliquez pour ouvrir le PDF';
    filenameEl.textContent = name;
    // Si le viewer est déjà ouvert, le mettre à jour immédiatement
    if (state.popupWin && !state.popupWin.closed) {
      sendToViewer({ type: 'PDF_LOAD', url, name });
      liveBadge.classList.add('on');
      mainLabel.textContent = '↻ PDF mis à jour dans le viewer';
    } else {
      liveBadge.classList.remove('on');
    }
  }

  // ── État : pas de PDF ──────────────────────────────────────────────────────
  function setNoPDF(msg) {
    state.currentUrl  = null;
    state.currentName = null;
    app.classList.add('no-pdf');
    mainLabel.textContent  = msg;
    filenameEl.textContent = '';
    liveBadge.classList.remove('on');
  }

  // ── Ouvrir ou reprendre le viewer ─────────────────────────────────────────
  function openOrUpdateViewer() {
    if (state.popupWin && !state.popupWin.closed) {
      state.popupWin.focus();
      sendToViewer({ type: 'PDF_LOAD', url: state.currentUrl, name: state.currentName });
      return;
    }
    const w = 1100, h = 820;
    const left = Math.max(0, (screen.width  - w) / 2);
    const top  = Math.max(0, (screen.height - h) / 2);
    state.popupWin = window.open(
      VIEWER_URL, 'grist-pdf-viewer',
      `width=${w},height=${h},left=${left},top=${top},resizable=yes,scrollbars=no`
    );
    // Délai pour laisser la popup charger, puis envoyer le PDF
    setTimeout(() => {
      sendToViewer({ type: 'PDF_LOAD', url: state.currentUrl, name: state.currentName });
      liveBadge.classList.add('on');
      mainLabel.textContent = '↻ PDF mis à jour dans le viewer';
    }, 1800);
  }

  // ── Message vers le viewer ─────────────────────────────────────────────────
  window.addEventListener('message', (e) => {
    if (e.data?.type === 'VIEWER_READY') {
      sendToViewer({ type: 'PDF_LOAD', url: state.currentUrl, name: state.currentName });
      liveBadge.classList.add('on');
    }
  });

  function sendToViewer(msg) {
    if (state.popupWin && !state.popupWin.closed) {
      state.popupWin.postMessage(msg, '*');
    }
  }

  // ── Sélecteur de colonnes ──────────────────────────────────────────────────
  function refreshColSelector() {
    const prev = colSelect.value || state.columnName;
    colSelect.innerHTML = '<option value="">— sélectionner —</option>';
    state.allColumns.forEach(col => {
      const opt = document.createElement('option');
      opt.value       = col;
      opt.textContent = col;
      if (col === prev) opt.selected = true;
      colSelect.appendChild(opt);
    });
    colType.value = state.columnType || 'url';
  }

  function showConfigErr(msg) { configErr.textContent = msg; configErr.style.display = 'block'; }
  function hideConfigErr()    { configErr.style.display = 'none'; }
</script>
</body>
</html>
