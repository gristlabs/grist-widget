name: Bump Version and Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run (skip actual publish)'
        type: boolean
        default: true

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  bump_version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.get_sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Get desired version
        id: get_version
        # --update-cache updates buildtools/version-cache.json as a side effect.
        # This runs regardless of whether publishing later succeeds, but is safe
        # because the publish job independently compares local vs NPM versions.
        # On re-run after a publish failure, the bump job becomes a no-op (cache
        # already up to date, versions match) while the publish job still detects
        # the NPM discrepancy and retries.
        run: echo "version=$(node buildtools/get_version.js --update-cache)" >> "$GITHUB_OUTPUT"

      - name: Get current version
        id: current_version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Bump version if changed
        if: steps.get_version.outputs.version != steps.current_version.outputs.version
        run: |
          npm version "$VERSION" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json buildtools/version-cache.json
          git commit -m "Bump version to $VERSION"
          git push
        env:
          VERSION: ${{ steps.get_version.outputs.version }}

      - name: Get post-bump commit SHA
        id: get_sha
        # Captures HEAD after the bump commit (if any) so the publish job
        # checks out the exact tree with the updated package.json.
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish:
    needs: bump_version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump_version.outputs.sha }}
          submodules: true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Get local version
        id: local_version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Get NPM version
        id: npm_version
        # Returns 0.0.0 if the package is not yet on NPM (first publish) or if
        # the registry is unreachable. In the latter case a publish attempt will
        # also fail, so this is harmless.
        run: echo "version=$(npm view @gristlabs/grist-widget version 2>/dev/null || echo '0.0.0')" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: >-
          steps.local_version.outputs.version != steps.npm_version.outputs.version
          && steps.local_version.outputs.version != '0.0.0'
        run: npm publish --access public $DRY_RUN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
