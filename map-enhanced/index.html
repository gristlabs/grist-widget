<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.6.0/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.6.0/dist/leaflet-src.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="screen.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-control-geocoder@3.1.0/dist/Control.Geocoder.js"></script>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
    <script src="page.js"></script>
    <style>
      /* ================================================================
         Settings panel
      ================================================================ */
      #settings {
        font-family: sans-serif;
        font-size: 13px;
      }
      #settings h3 {
        margin: 10px 0 5px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #888;
      }
      #settings table { width: 100%; border-collapse: collapse; }
      #settings td    { padding: 3px 4px; vertical-align: middle; }
      #settings td:first-child { white-space: nowrap; color: #444; min-width: 140px; }
      #settings input[type="text"],
      #settings select {
        width: 100%; box-sizing: border-box;
        padding: 3px 5px; border: 1px solid #ccc; border-radius: 3px;
      }
      #settings input[type="range"] { width: 100px; vertical-align: middle; }
      #defaultZoomLabel,
      #popupDurationLabel {
        display: inline-block; width: 72px;
        font-size: 12px; font-weight: bold; color: #333;
      }
      #btnResetZoom {
        display: inline-block; margin-left: 4px; padding: 2px 8px;
        background: #eee; border: 1px solid #bbb; border-radius: 3px;
        cursor: pointer; font-size: 12px;
      }
      #btnResetZoom:hover { background: #ddd; }
      .section-sep { border: none; border-top: 1px solid #e8e8e8; margin: 8px 0; }

      /* ================================================================
         Colour swatches
      ================================================================ */
      #colorSwatches { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0; }
      .swatch {
        width: 28px; height: 28px; border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer; outline: none;
        transition: transform 0.1s;
      }
      .swatch:hover       { transform: scale(1.15); }
      .swatch-selected    { border-color: #333 !important; transform: scale(1.2); box-shadow: 0 0 0 2px #fff, 0 0 0 4px #333; }

      /* ================================================================
         Popup content
      ================================================================ */
      .map-popup .leaflet-popup-content-wrapper {
        border-left: 4px solid #1565C0;   /* updated dynamically by JS */
        border-radius: 6px;
        padding: 0;
      }
      .map-popup .leaflet-popup-content { margin: 10px 14px; }
      .popup-title {
        font-weight: bold;
        font-size: 13px;
        line-height: 1.3;
        color: #111;
      }
      .popup-desc {
        font-size: 11px;
        color: #555;
        font-weight: normal;
        line-height: 1.5;
        margin-top: 3px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="settings">
      <div id="btnClose">Fermer / Close</div>

      <!-- Mode -->
      <h3>Mode d'affichage</h3>
      <label for="cbxMode">
        <input type="checkbox" id="cbxMode">
        Toutes les localisations
      </label>

      <hr class="section-sep"/>

      <!-- Zoom -->
      <h3>Zoom</h3>
      <table>
        <tr>
          <td><label for="defaultZoom">Zoom initial max.</label></td>
          <td>
            <input type="range" id="defaultZoom" min="1" max="20" value="13">
            <span id="defaultZoomLabel">13</span>
          </td>
        </tr>
        <tr>
          <td><label for="cbxLockZoom">Verrouiller le zoom</label></td>
          <td>
            <input type="checkbox" id="cbxLockZoom">
            <span style="color:#888;font-size:11px;"> fixe entre les changements de point</span>
          </td>
        </tr>
        <tr>
          <td></td>
          <td><span id="btnResetZoom">↺ Réinitialiser le zoom</span></td>
        </tr>
      </table>

      <hr class="section-sep"/>

      <!-- Étiquette -->
      <h3>Étiquette (popup)</h3>
      <table>
        <tr>
          <td><label for="cbxShowPopup">Afficher l'étiquette</label></td>
          <td>
            <input type="checkbox" id="cbxShowPopup">
            <span style="color:#888;font-size:11px;"> à la sélection / au clic</span>
          </td>
        </tr>
        <tr id="durationRow">
          <td><label for="popupDuration">Durée d'affichage</label></td>
          <td>
            <input type="range" id="popupDuration" min="0" max="59" value="0">
            <span id="popupDurationLabel">Permanente</span>
          </td>
        </tr>
      </table>
      <p style="margin:4px 0 0;font-size:11px;color:#999;">
        Colonne <b>Name</b> → titre gras &nbsp;|&nbsp; Colonne <b>Description</b> → texte fin (optionnel)
      </p>

      <hr class="section-sep"/>

      <!-- Couleur du pin -->
      <h3>Couleur du pin et de l'étiquette</h3>
      <div id="colorSwatches"></div>

      <hr class="section-sep"/>

      <!-- Fond de carte -->
      <h3>Fond de carte</h3>
      <table>
        <tr>
          <td><label for="mapPreset">Carte</label></td>
          <td><select id="mapPreset"></select></td>
        </tr>
        <tr class="custom-row" style="display:none">
          <td><label for="mapSource">URL source</label></td>
          <td><input type="text" id="mapSource" placeholder="https://…/{z}/{x}/{y}.png"></td>
        </tr>
        <tr class="custom-row" style="display:none">
          <td><label for="mapCopyright">Copyright</label></td>
          <td><input type="text" id="mapCopyright" placeholder="&copy; contributeurs"></td>
        </tr>
      </table>
    </div>
  </body>
</html>
