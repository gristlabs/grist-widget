<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Render sanitized HTML from a cell</title>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.2.9/dist/purify.min.js"></script>
    <style>
      html, body {
          width: 100%;
          height: 100vh;
          padding: 0;
          margin: 0;
      }
      #error {
          display: none;
          background: red;
          color: white;
          padding: 20px;
          text-align: center;
      }
      #rendered {
          display: none;
          width: 100%;
          height: 100%;
          border: none;
      }
    </style>
  </head>
  <body>
    <div id="error"></div>
    <iframe id="rendered" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation"></iframe>
    <script>
      var params = new URLSearchParams(window.location.search)
      var ADD_TAGS = params.get('tags')?.split(",");
      var ADD_ATTR = params.get('attr')?.split(",");

      var renderedFrame = document.getElementById('rendered');

      // ancestorOrigins is readable cross-origin, so it works
      // whether the widgetand Grist share an origin or not.
      // document.referrer is used as a fallback for browsers 
      // that don't support ancestorOrigins.
      function getGristOrigin() {
        try {
          if (window.location.ancestorOrigins?.length > 0) {
            return new URL(window.location.ancestorOrigins[0]).origin;
          }
          if (document.referrer) {
            return new URL(document.referrer).origin;
          }
        } catch (_) {}
        return null;
      }

      function isGristLink(href) {
        try {
          const gristOrigin = getGristOrigin();
          return gristOrigin !== null && new URL(href).origin === gristOrigin;
        } catch (_) {
          return false;
        }
      }

      // Add target="_top" to internal Grist links so they navigate the main window.
      // External links are left as-is: they open in the iframe, and when the cell
      // changes the srcdoc is updated, resetting the iframe automatically.
      // If the grist origin can't be detected, all links get target="_blank" as a
      // safe fallback to avoid opening a nested grist inside the iframe.
      function processLinks(el) {
        const gristOrigin = getGristOrigin();
        el.querySelectorAll('a[href]').forEach(a => {
          if (gristOrigin === null) {
            a.setAttribute('target', '_blank');
            a.setAttribute('rel', 'noopener noreferrer');
          } else if (isGristLink(a.href)) {
            a.setAttribute('target', '_top');
          }
        });
      }

      function render(elemId, content) {
        var el = document.getElementById(elemId);
        if (!content) {
          el.style.display = 'none';
        } else {
          el.style.display = 'block';
          if (elemId === 'rendered') {
            const sanitized = DOMPurify.sanitize(content, {ADD_TAGS, ADD_ATTR, FORCE_BODY: true});
            const tmp = document.createElement('div');
            tmp.innerHTML = sanitized;
            processLinks(tmp);
            renderedFrame.srcdoc = tmp.innerHTML;
          } else {
            el.innerHTML = DOMPurify.sanitize(content, {ADD_TAGS, ADD_ATTR, FORCE_BODY: true});
          }
        }
      }

      grist.ready({
        columns:["Html"],
        requiredAccess: 'read table'
      });
      let lastId = undefined;
      let lastData = undefined;
      // Helper function that reads first value from a table with a single column.
      function singleColumn(record) {
        const columns = Object.keys(record || {}).filter(k => k !== 'id');
        return columns.length === 1 ? record[columns[0]] : undefined;
      }
      grist.onNewRecord(() => {
        render("error", null);
        render("rendered", "");
        lastData = "";
        lastId = 0;
      });
      grist.onRecord(function(record) {
        // If user picked all columns, this helper function will return a mapped record.
        const mapped = grist.mapColumnNames(record);
        // We will fallback to reading a value from a single column to
        // support old way of mapping (exposing only a single column).
        // New widgets should only check if mapped object is truthy.
        const data = mapped ? mapped.Html : singleColumn(record);
        if (data === undefined) {
          render("error", "Please choose a column to show in the Creator Panel.");
        } else {
          render("error", null);
          if (lastId !== record.id || lastData !== data) {
            render("rendered", String(data || ''));
          }
          lastId = record.id;
          lastData = data;
        }
      });
    </script>
  </body>
</html>
